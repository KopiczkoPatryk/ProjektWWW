<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GameStation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="glowny-header">
        <div class="pasek-gorny">
            <div class="kontener">
                
                <a href="index.html" class="przekierowanie-mainpage">
                    <img src="logo.png" href="index.html" width="80" height="80" alt="GameStation - Strona Główna" class="logo-img">
                </a>
                <form class="wyszukiwarka">
                    <input type="text" placeholder="Summer Sale nie oddaje, mordo?">
                    <button type="submit">Szukaj</button>
                </form>
                <div class="konto-menu">
                    <a href="https://youtu.be/dQw4w9WgXcQ?si=oG3Nqt_jhrhzF69-">
                        <i class="fa-solid fa-circle-user"></i>
                        <span>User1234</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="pasek-dolny">
            <div class="kontener">
                <div class="kafelki">
                    <ul>
                        <li>
                            <a href="#">
                                <i class="fa-solid fa-bars"></i>
                                <span>Kategorie</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <i class="fa-solid fa-piggy-bank"></i>
                                <span>Tanie gry</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <i class="fa-solid fa-key"></i>
                                <span>Klucze</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <i class="fa-solid fa-dice"></i>
                                <span>Losowe klucze</span>
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <i class="fa-solid fa-hand-holding-dollar"></i>
                                <span>Prepaid</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="naglowek">
        <h1>Taniej gier nie znajdziesz, nie no stary mówie ci.</h1>
        <h2>No chyba, że wujek Gaben powie inaczej...</h2>
    </div>
    <footer class="stopka">Copyright © 2026 GameStation. Wszelkie prawa zastrzeżone.</footer>
</body>
</html>
